<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бурмалда Меллстроя - Слоты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e0f2e 0%, #2d1b4e 50%, #1e0f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .game-container {
            position: relative;
            width: 900px;
            padding: 40px;
            background: linear-gradient(145deg, #2a1f3d, #1a1525);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 2px 10px rgba(255,255,255,0.1);
            border: 3px solid #ffd700;
        }

        .mellstroy-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 4px solid #ffd700;
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            background: #000;
        }

        .mellstroy-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(255,215,0,0.8);
        }

        .mellstroy-btn:active {
            transform: scale(0.95);
        }

        .mellstroy-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mellstroy-btn::after {
            content: '🔊';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }

        .balance-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .balance-box {
            background: linear-gradient(145deg, #1a0f2e, #2d1f4e);
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .balance-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .balance-value {
            font-size: 1.8em;
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        .add-money-btn {
            background: linear-gradient(145deg, #00aa55, #00cc66);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,204,102,0.4);
        }

        .add-money-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,204,102,0.6);
        }

        .add-money-btn:active {
            transform: translateY(0);
        }

        .slots-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            position: relative;
        }

        .slots-container {
            background: linear-gradient(145deg, #0f0518, #1a0f2e);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #ffd700;
            box-shadow: inset 0 5px 20px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.3);
        }

        .slots-row {
            display: flex;
            gap: 15px;
        }

        .slot {
            width: 120px;
            height: 150px;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.5);
            border: 3px solid #333;
            overflow: hidden;
            position: relative;
        }

        .slot.spinning {
            animation: spin 0.1s linear infinite;
            background: linear-gradient(145deg, #f0f0f0, #d0d0d0);
        }

        @keyframes spin {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(5px); }
        }

        .slot.winner {
            animation: winner 0.5s ease-in-out 3;
            box-shadow: 0 0 30px #ffd700, inset 0 0 20px rgba(255,215,0,0.5);
            border-color: #ffd700;
        }

        @keyframes winner {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .lever-container {
            position: relative;
            width: 80px;
            height: 250px;
            cursor: pointer;
        }

        .lever-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 80px;
            background: linear-gradient(145deg, #4a4a4a, #2a2a2a);
            border-radius: 10px;
            border: 3px solid #666;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .lever-track {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 150px;
            background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
            border-radius: 10px;
            border: 2px solid #555;
        }

        .lever-handle {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 70px;
            background: linear-gradient(145deg, #ff6b6b, #c92a2a);
            border-radius: 15px;
            border: 3px solid #ff8787;
            cursor: grab;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.3);
            transition: bottom 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .lever-handle:active {
            cursor: grabbing;
        }

        .lever-handle.pulling {
            background: linear-gradient(145deg, #ff8787, #e03131);
        }

        .lever-text {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 0.8em;
            text-align: center;
            white-space: nowrap;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .bet-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .bet-control {
            background: linear-gradient(145deg, #2a1f3d, #1a1525);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bet-label {
            color: #aaa;
            font-size: 1em;
        }

        .bet-value {
            color: #ffd700;
            font-size: 1.5em;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        .bet-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #000;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(255,215,0,0.4);
        }

        .bet-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255,215,0,0.6);
        }

        .bet-btn:active {
            transform: scale(0.95);
        }

        .bet-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .message {
            text-align: center;
            font-size: 1.5em;
            margin: 20px 0;
            min-height: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .message.win {
            color: #00ff88;
            animation: winPulse 0.5s ease-in-out 3;
        }

        .message.lose {
            color: #ff6b6b;
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .paytable {
            margin-top: 30px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffd700;
        }

        .paytable h3 {
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
        }

        .paytable-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.9em;
        }

        .paytable-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .paytable-symbols {
            font-size: 1.5em;
        }

        .paytable-multiplier {
            color: #00ff88;
            font-weight: bold;
        }

        @media (max-width: 950px) {
            .game-container {
                width: 95%;
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .slot {
                width: 80px;
                height: 100px;
                font-size: 2.5em;
            }
            
            .lever-container {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Кнопка с Меллстроем -->
        <div class="mellstroy-btn" id="mellstroyBtn" title="Нажми меня!">
            <!-- ЗАМЕНИТЕ src НА ПУТЬ К ВАШЕЙ КАРТИНКЕ -->
            <img src="mellstroy.png" alt="Mellstroy" id="mellstroyImg">
        </div>

        <h1>🎰 БУРМАЛДА МЕЛЛСТРОЯ 🎰</h1>

        <div class="balance-section">
            <div class="balance-box">
                <div class="balance-label">💰 БАЛАНС</div>
                <div class="balance-value" id="balance">1000 ₽</div>
            </div>
            <button class="add-money-btn" id="addMoneyBtn">+100 ₽ (Бонус)</button>
        </div>

        <div class="bet-section">
            <div class="bet-control">
                <button class="bet-btn" id="betMinus">−</button>
                <span class="bet-label">СТАВКА:</span>
                <span class="bet-value" id="betValue">50 ₽</span>
                <button class="bet-btn" id="betPlus">+</button>
            </div>
        </div>

        <div class="message" id="message">Дёрни рычаг чтобы начать!</div>

        <div class="slots-wrapper">
            <div class="slots-container">
                <div class="slots-row">
                    <div class="slot" id="slot1">🍒</div>
                    <div class="slot" id="slot2">🍒</div>
                    <div class="slot" id="slot3">🍒</div>
                </div>
            </div>

            <div class="lever-container" id="leverContainer">
                <div class="lever-text">ТЯНИ ВНИЗ!</div>
                <div class="lever-track"></div>
                <div class="lever-handle" id="leverHandle">🎯</div>
                <div class="lever-base"></div>
            </div>
        </div>

        <div class="paytable">
            <h3>📊 ТАБЛИЦА ВЫПЛАТ</h3>
            <div class="paytable-grid">
                <div class="paytable-item">
                    <span class="paytable-symbols">7️⃣7️⃣7️⃣</span>
                    <span class="paytable-multiplier">x50</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">💎💎💎</span>
                    <span class="paytable-multiplier">x20</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">🔔🔔</span>
                    <span class="paytable-multiplier">x15</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">🍀🍀🍀</span>
                    <span class="paytable-multiplier">x10</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">🍒🍒</span>
                    <span class="paytable-multiplier">x5</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">🍋🍋</span>
                    <span class="paytable-multiplier">x3</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">🍒 / 🍋</span>
                    <span class="paytable-multiplier">x1.5</span>
                </div>
                <div class="paytable-item">
                    <span class="paytable-symbols">Любые 2</span>
                    <span class="paytable-multiplier">x0.5</span>
                </div>
            </div>
        </div>
    </div>

    <!-- АУДИО ФАЙЛ (замените src на путь к вашему звуку) -->
    <audio id="mellstroySound" preload="auto">
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Игровые переменные
        let balance = 1000;
        let currentBet = 50;
        const MIN_BET = 50;
        const STEP = 50;
        
        // Символы и их веса (для рандома)
        const symbols = [
            { icon: '7️⃣', weight: 2, multiplier: 50 },
            { icon: '💎', weight: 4, multiplier: 20 },
            { icon: '🔔', weight: 6, multiplier: 15 },
            { icon: '🍀', weight: 8, multiplier: 10 },
            { icon: '🍒', weight: 12, multiplier: 5 },
            { icon: '🍋', weight: 15, multiplier: 3 }
        ];

        // DOM элементы
        const balanceEl = document.getElementById('balance');
        const betValueEl = document.getElementById('betValue');
        const betPlusBtn = document.getElementById('betPlus');
        const betMinusBtn = document.getElementById('betMinus');
        const addMoneyBtn = document.getElementById('addMoneyBtn');
        const messageEl = document.getElementById('message');
        const leverHandle = document.getElementById('leverHandle');
        const leverContainer = document.getElementById('leverContainer');
        const slots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        const mellstroyBtn = document.getElementById('mellstroyBtn');
        const mellstroySound = document.getElementById('mellstroySound');

        // Инициализация
        updateBalance();
        updateBetControls();

        // Обработчики кнопок ставки
        betPlusBtn.addEventListener('click', () => {
            if (currentBet + STEP <= balance) {
                currentBet += STEP;
                updateBetControls();
            }
        });

        betMinusBtn.addEventListener('click', () => {
            if (currentBet - STEP >= MIN_BET) {
                currentBet -= STEP;
                updateBetControls();
            }
        });

        // Кнопка добавления денег
        addMoneyBtn.addEventListener('click', () => {
            balance += 100;
            updateBalance();
            updateBetControls();
            showMessage('+100 ₽ добавлено!', 'win');
        });

        // Кнопка Меллстроя
        mellstroyBtn.addEventListener('click', () => {
            mellstroySound.currentTime = 0;
            mellstroySound.play().catch(e => console.log('Audio play failed:', e));
            
            // Эффект нажатия
            mellstroyBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                mellstroyBtn.style.transform = '';
            }, 200);
        });

        // Механика рычага
        let isDragging = false;
        let startY = 0;
        let startBottom = 70;
        const MAX_PULL = 150;
        const TRIGGER_PULL = 120;

        leverHandle.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', endDrag);

        // Для тач-устройств
        leverHandle.addEventListener('touchstart', (e) => {
            startDrag(e.touches[0]);
            e.preventDefault();
        });
        document.addEventListener('touchmove', (e) => {
            drag(e.touches[0]);
        });
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            startY = e.clientY;
            leverHandle.classList.add('pulling');
        }

        function drag(e) {
            if (!isDragging) return;
            
            const deltaY = startY - e.clientY;
            let newBottom = startBottom + deltaY;
            
            // Ограничения
            if (newBottom < 70) newBottom = 70;
            if (newBottom > 70 + MAX_PULL) newBottom = 70 + MAX_PULL;
            
            leverHandle.style.bottom = newBottom + 'px';
            
            // Проверка на активацию
            if (newBottom >= 70 + TRIGGER_PULL && !leverHandle.dataset.activated) {
                leverHandle.dataset.activated = 'true';
                leverHandle.style.background = 'linear-gradient(145deg, #00ff88, #00cc66)';
            } else if (newBottom < 70 + TRIGGER_PULL) {
                leverHandle.dataset.activated = '';
                leverHandle.style.background = '';
            }
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            
            const currentBottom = parseInt(leverHandle.style.bottom) || 70;
            
            // Если дёрнули достаточно сильно
            if (currentBottom >= 70 + TRIGGER_PULL) {
                spinSlots();
            }
            
            // Возврат рычага
            leverHandle.style.transition = 'bottom 0.3s ease-out';
            leverHandle.style.bottom = '70px';
            leverHandle.classList.remove('pulling');
            leverHandle.dataset.activated = '';
            
            setTimeout(() => {
                leverHandle.style.transition = 'bottom 0.1s';
            }, 300);
        }

        // Вращение слотов
        function spinSlots() {
            if (balance < currentBet) {
                showMessage('Недостаточно средств!', 'lose');
                return;
            }
            
            // Списание ставки
            balance -= currentBet;
            updateBalance();
            updateBetControls();
            
            // Очистка предыдущих выигрышей
            slots.forEach(slot => slot.classList.remove('winner'));
            showMessage('🎲 Крутим...');
            
            // Анимация вращения
            slots.forEach((slot, index) => {
                slot.classList.add('spinning');
                // Быстрая смена символов
                const interval = setInterval(() => {
                    const randomSymbol = getRandomSymbol();
                    slot.textContent = randomSymbol.icon;
                }, 100);
                
                // Остановка слотов по очереди
                setTimeout(() => {
                    clearInterval(interval);
                    slot.classList.remove('spinning');
                    const finalSymbol = getRandomSymbol();
                    slot.textContent = finalSymbol.icon;
                    slot.dataset.multiplier = finalSymbol.multiplier;
                    
                    // Последний слот - проверка выигрыша
                    if (index === 2) {
                        setTimeout(checkWin, 300);
                    }
                }, 1000 + (index * 300));
            });
        }

        // Получение случайного символа (с учётом весов)
        function getRandomSymbol() {
            const totalWeight = symbols.reduce((sum, s) => sum + s.weight, 0);
            let random = Math.random() * totalWeight;
            
            for (const symbol of symbols) {
                random -= symbol.weight;
                if (random <= 0) {
                    return symbol;
                }
            }
            
            return symbols[symbols.length - 1];
        }

        // Проверка выигрыша
        function checkWin() {
            const results = slots.map(slot => ({
                icon: slot.textContent,
                multiplier: parseInt(slot.dataset.multiplier)
            }));
            
            let winAmount = 0;
            let isWin = false;
            
            // 3 одинаковых
            if (results[0].icon === results[1].icon && results[1].icon === results[2].icon) {
                winAmount = currentBet * results[0].multiplier;
                isWin = true;
                slots.forEach(slot => slot.classList.add('winner'));
            }
            // 2 одинаковых (первые два)
            else if (results[0].icon === results[1].icon) {
                winAmount = Math.floor(currentBet * 1.5);
                isWin = true;
                slots[0].classList.add('winner');
                slots[1].classList.add('winner');
            }
            // 2 одинаковых (последние два)
            else if (results[1].icon === results[2].icon) {
                winAmount = Math.floor(currentBet * 1.5);
                isWin = true;
                slots[1].classList.add('winner');
                slots[2].classList.add('winner');
            }
            // 2 одинаковых (первый и последний)
            else if (results[0].icon === results[2].icon) {
                winAmount = Math.floor(currentBet * 1.5);
                isWin = true;
                slots[0].classList.add('winner');
                slots[2].classList.add('winner');
            }
            // Любой символ повторяется (утешительный приз)
            else {
                const icons = [results[0].icon, results[1].icon, results[2].icon];
                const uniqueIcons = [...new Set(icons)];
                if (uniqueIcons.length === 2) {
                    winAmount = Math.floor(currentBet * 0.5);
                    isWin = true;
                }
            }
            
            if (isWin && winAmount > 0) {
                balance += winAmount;
                updateBalance();
                updateBetControls();
                showMessage(`🎉 ВЫИГРЫШ: ${winAmount} ₽!`, 'win');
            } else {
                showMessage('Попробуй ещё раз!', 'lose');
            }
        }

        // Обновление баланса
        function updateBalance() {
            balanceEl.textContent = `${balance} ₽`;
        }

        // Обновление кнопок ставки
        function updateBetControls() {
            betValueEl.textContent = `${currentBet} ₽`;
            betMinusBtn.disabled = currentBet <= MIN_BET;
            betPlusBtn.disabled = currentBet + STEP > balance;
        }

        // Показ сообщения
        function showMessage(text, type = '') {
            messageEl.textContent = text;
            messageEl.className = 'message';
            if (type) {
                messageEl.classList.add(type);
            }
        }

        // Предотвращение выделения текста при перетаскивании
        document.addEventListener('selectstart', (e) => {
            if (isDragging) e.preventDefault();
        });
    </script>
</body>
</html>
